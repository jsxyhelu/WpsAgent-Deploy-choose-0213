<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="agentGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 中心智能节点 -->
  <circle cx="64" cy="64" r="18" fill="url(#agentGradient1)" stroke="#667eea" stroke-width="3"/>
  <circle cx="64" cy="64" r="10" fill="#ffffff" opacity="0.3"/>
  
  <!-- 周围连接节点 -->
  <circle cx="32" cy="32" r="10" fill="url(#agentGradient2)" stroke="#f5576c" stroke-width="2"/>
  <circle cx="96" cy="32" r="10" fill="url(#agentGradient2)" stroke="#f5576c" stroke-width="2"/>
  <circle cx="32" cy="96" r="10" fill="url(#agentGradient2)" stroke="#f5576c" stroke-width="2"/>
  <circle cx="96" cy="96" r="10" fill="url(#agentGradient2)" stroke="#f5576c" stroke-width="2"/>
  
  <!-- 连接线 -->
  <line x1="64" y1="64" x2="32" y2="32" stroke="#667eea" stroke-width="3" opacity="0.6"/>
  <line x1="64" y1="64" x2="96" y2="32" stroke="#667eea" stroke-width="3" opacity="0.6"/>
  <line x1="64" y1="64" x2="32" y2="96" stroke="#667eea" stroke-width="3" opacity="0.6"/>
  <line x1="64" y1="64" x2="96" y2="96" stroke="#667eea" stroke-width="3" opacity="0.6"/>
  
  <!-- 数据流动效果（小圆点） -->
  <circle cx="48" cy="48" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="48" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="48" cy="80" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="80" r="3" fill="#ffffff" opacity="0.8"/>
  
  <!-- 外围环形装饰 -->
  <circle cx="64" cy="64" r="45" fill="none" stroke="#667eea" stroke-width="2" opacity="0.3" stroke-dasharray="8,4"/>
</svg>
