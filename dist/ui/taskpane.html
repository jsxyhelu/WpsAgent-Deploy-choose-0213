<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WpsAgent</title>
</head>

<body>
    <div class="chat-container">
        <!-- Tab 控件区域 -->
        <div class="tab-container">
            <div class="tab-list" id="tabList">
                <div class="tab-item active" data-tab-id="chat" onclick="tabManager.activateTab('chat')">
                    <span class="tab-label">对话</span>
                </div>
            </div>
        </div>
        
        <!-- Tab 内容区域 -->
        <div class="tab-contents">
            <!-- 对话 Tab -->
            <div class="tab-content active" data-tab-id="chat">
                <div class="chat-wrapper">
        <div class="chat-header">
            <div class="header-info">
                <div class="header-title">WpsAgent</div>
                <div class="header-subtitle">AI 助手</div>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="clearMarkers()" title="清除文档标记">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        <line x1="18" y1="9" x2="22" y2="5"></line>
                    </svg>
                    标记清空
                </button>
                <button class="action-btn" onclick="clearChat()" title="清空对话历史">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    历史清空
                </button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">你好！我是 WpsAgent，有什么可以帮助你的吗？</div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
                <button id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/>
                    </svg>
                </button>
            </div>
            <div class="ai-disclaimer">内容由AI生成，请仔细甄别</div>
        </div>
                </div>
            </div>
            <!-- 其他功能 Tab 将动态创建 -->
        </div>
    </div>
</body>

<script type="text/javascript" src="../js/logger.js"></script>
<script type="text/javascript" src="../js/config.js"></script>
<script type="text/javascript" src="../js/api.js"></script>
<script type="text/javascript" src="../js/document.js"></script>
<script type="text/javascript" src="../js/tabManager.js"></script>
<script type="text/javascript" src="../js/taskpane_new.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f5;
    height: 100vh;
    overflow: hidden;
}

.chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #ffffff;
}

/* Tab 控件样式 */
.tab-container {
    flex-shrink: 0;
    background: #f8f8f8;
    border-bottom: 1px solid #e0e0e0;
}

.tab-list {
    display: flex;
    align-items: stretch;
    padding: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none; /* Firefox */
}

.tab-list::-webkit-scrollbar {
    display: none; /* Chrome/Safari */
}

.tab-item {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    height: 32px;
    background: transparent;
    border: none;
    border-right: 1px solid #eee;
    cursor: pointer;
    font-size: 12px;
    color: #666;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
}

.tab-item:last-child {
    border-right: none;
}

.tab-item.active {
    color: #667eea;
    background: #ffffff;
    font-weight: 600;
}

.tab-item.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: #667eea;
}

.tab-label {
    user-select: none;
}

.tab-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin-left: 4px;
    opacity: 0;
    transition: all 0.2s;
}

.tab-item:hover .tab-close {
    opacity: 1;
}

.tab-close:hover {
    background: rgba(0, 0, 0, 0.1);
}

.tab-close svg {
    width: 12px;
    height: 12px;
}

/* Tab 内容区域 */
.tab-contents {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.tab-content {
    display: none;
    height: 100%;
    overflow: auto;
}

.tab-content.active {
    display: flex;
    flex-direction: column;
}

.chat-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.chat-header {
    padding: 8px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-info {
    flex: 1;
}

.header-title {
    font-size: 18px;
    font-weight: 600;
}

.header-subtitle {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
}

.header-actions {
    display: flex;
    gap: 8px;
}

.action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 6px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.action-btn:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.4);
}

.action-btn:active {
    background: rgba(255, 255, 255, 0.1);
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    display: flex;
    max-width: 85%;
}

.message.user {
    align-self: flex-end;
}

.message.assistant {
    align-self: flex-start;
}

.message-content {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
}

/* Markdown 内容样式 */
.message-content h1, .message-content h2, .message-content h3 {
    margin: 8px 0 4px 0;
    font-weight: 600;
}
.message-content h1 { font-size: 1.4em; }
.message-content h2 { font-size: 1.3em; }
.message-content h3 { font-size: 1.2em; }

.message-content ul, .message-content ol {
    padding-left: 20px;
    margin: 8px 0;
}
.message-content li {
    margin: 4px 0;
}

.message-content code {
    background: #f0f0f0;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: monospace;
}

.message-content pre {
    background: #2d2d2d;
    color: #f8f8f2;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
}
.message-content pre code {
    background: none;
    padding: 0;
}

.message.user .message-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 4px;
}

.message.assistant .message-content {
    background: #f0f0f0;
    color: #333;
    border-bottom-left-radius: 4px;
}

.message.loading .message-content {
    display: flex;
    align-items: center;
    gap: 4px;
}

.loading-dot {
    width: 6px;
    height: 6px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}

.loading-dot:nth-child(1) { animation-delay: -0.32s; }
.loading-dot:nth-child(2) { animation-delay: -0.16s; }
.loading-dot:nth-child(3) { animation-delay: 0; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

.chat-input-area {
    padding: 12px 16px 16px;
    background: #ffffff;
    border-top: 1px solid #e8e8e8;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.input-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 8px 8px 8px 16px;
}

#userInput {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
    font-family: inherit;
}

#userInput::placeholder {
    color: #999;
}

#sendBtn {
    width: 36px;
    height: 36px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s;
}

#sendBtn:hover {
    transform: scale(1.05);
}

#sendBtn:active {
    transform: scale(0.95);
}

#sendBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.chat-messages::-webkit-scrollbar {
    width: 6px;
}

.chat-messages::-webkit-scrollbar-track {
    background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
    background: #ddd;
    border-radius: 3px;
}

.chat-messages::-webkit-scrollbar-thumb:hover {
    background: #ccc;
}

.ai-disclaimer {
    text-align: center;
    font-size: 11px;
    color: #999;
    margin-top: 4px;
}
</style>

</html>
